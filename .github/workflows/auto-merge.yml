name: Auto-merge PRs

# Thin stub — the pipeline lives in chrischall/workflows (see
# reusable-auto-merge.yml). Arms `gh pr merge --auto --squash` for
# dependabot PRs (as soon as non-draft) and for same-repo PRs carrying
# `ready-to-merge`. The merge still waits on the required `ci / ci` check,
# so this is "merge when CI is green", not "merge without CI".
#
# `pull_request_target` so dependabot's restricted token can arm; PR code
# is never checked out or executed. RELEASE_PAT (not GITHUB_TOKEN) so the
# eventual push to main fires the release-please `push` workflow.
#
# Requires the repo's "Allow auto-merge" setting to be enabled.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize, labeled]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  arm:
    uses: chrischall/workflows/.github/workflows/reusable-auto-merge.yml@main
    secrets:
      release_pat: ${{ secrets.RELEASE_PAT }}
