# Workflow name + job id stay `ci`, but the ruleset's required check is now
# the `ci-gated` COMMIT STATUS posted by the shared arm-gate composite
# (chrischall/workflows/.github/actions/arm-gate@main), not the `ci / ci` job.
name: ci

on:
  pull_request:
    # `labeled` so arming `ready-to-merge` (or `release-ready` on a release
    # PR) triggers the deferred run.
    types: [opened, synchronize, reopened, labeled]

# statuses: write is load-bearing: the gate and the final step post the
# `ci-gated` commit status (the ruleset's required check), and
# dependabot-triggered runs are read-only unless permissions are explicit.
permissions:
  contents: read
  statuses: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # Deferred-merge gate (shared with the fleet), status mode: CI waits
      # until auto-review arms the PR with `ready-to-merge`; an un-armed PR is
      # held by a yellow `ci-gated: pending` commit status while this job
      # stays green. See chrischall/workflows/.github/actions/arm-gate.
      - uses: chrischall/workflows/.github/actions/arm-gate@main
        id: gate
        with:
          mode: status

      - uses: actions/checkout@v7
        if: steps.gate.outputs.run == 'true'

      - uses: actions/setup-python@v6
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: "3.12"

      - name: Validate marketplace.json
        if: steps.gate.outputs.run == 'true'
        run: python3 scripts/validate.py

      - name: Check marketplace.json is canonically formatted
        if: steps.gate.outputs.run == 'true'
        run: |
          python3 - <<'EOF'
          import json, pathlib, sys
          p = pathlib.Path(".claude-plugin/marketplace.json")
          raw = p.read_text()
          # ensure_ascii=False so the canonical form matches release-please's
          # JSON.stringify output (literal UTF-8, e.g. em-dashes) — see #11.
          canonical = json.dumps(json.loads(raw), indent=2, ensure_ascii=False) + "\n"
          if raw != canonical:
              print("::error::marketplace.json is not canonically formatted "
                    "(run `python3 scripts/regen.py` and commit).")
              sys.exit(1)
          print("marketplace.json formatting OK")
          EOF

      # Flip ci-gated to the real outcome. `always()` so a failed build posts
      # `failure` (merge stays blocked, checks UI explains why) instead of
      # leaving a stale `pending`.
      - name: Report ci-gated status
        if: always() && steps.gate.outputs.run == 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then STATE=success; DESC="CI passed"; else STATE=failure; DESC="CI failed — see the ci job log"; fi
          gh api "repos/$REPO/statuses/$HEAD_SHA" \
            -f state="$STATE" -f context=ci-gated -f description="$DESC" >/dev/null
          echo "ci-gated → $STATE"
