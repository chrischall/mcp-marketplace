# Workflow name + job id are both `ci` so the check context is `ci / ci`,
# which is the required status check declared in the branch ruleset.
name: ci

on:
  pull_request:
    # `labeled` so arming `ready-to-merge` (or `release-ready` on a release
    # PR) triggers the deferred run.
    types: [opened, synchronize, reopened, labeled]

jobs:
  ci:
    runs-on: ubuntu-latest
    # CI is the LAST gate, not a parallel cost (mirrors ofw-mcp):
    #   - normal (human) PRs: run only once auto-review passes and arms
    #     `ready-to-merge` — the label event fires the run; pushes to an
    #     armed PR re-run via `synchronize` (label still present).
    #   - release-please PRs: deferred to the `release-ready` ship signal.
    #   - BOT-authored PRs (dependabot): run on EVERY event, unconditionally —
    #     bots never receive auto-review, and native auto-merge treats a
    #     skipped required check as satisfied.
    #   - non-pull_request runs fall through unharmed.
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.type != 'User' ||
      (
        (github.event.action != 'labeled' || github.event.label.name == 'release-ready' || github.event.label.name == 'ready-to-merge') &&
        (
          (startsWith(github.event.pull_request.head.ref, 'release-please--') && contains(github.event.pull_request.labels.*.name, 'release-ready')) ||
          (!startsWith(github.event.pull_request.head.ref, 'release-please--') && contains(github.event.pull_request.labels.*.name, 'ready-to-merge'))
        )
      )
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate marketplace.json
        run: python3 scripts/validate.py

      - name: Check marketplace.json is canonically formatted
        run: |
          python3 - <<'EOF'
          import json, pathlib, sys
          p = pathlib.Path(".claude-plugin/marketplace.json")
          raw = p.read_text()
          canonical = json.dumps(json.loads(raw), indent=2) + "\n"
          if raw != canonical:
              print("::error::marketplace.json is not canonically formatted "
                    "(run `python3 scripts/regen.py` and commit).")
              sys.exit(1)
          print("marketplace.json formatting OK")
          EOF
