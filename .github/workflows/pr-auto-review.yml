name: PR auto-review

# Thin stub — the review pipeline lives in chrischall/workflows. See
# reusable-pr-auto-review.yml there for the full contract (auto-review
# label, Copilot request, size-tiered model, JSON-schema verdict, and
# arming `ready-to-merge` on a `pass` via RELEASE_PAT).
#
# The stub owns workflow-level concurrency (a called workflow cannot). The
# `labeled` group is keyed by label name so an opened+labeled burst can't
# let the labeled event displace the queued review.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: |
    pr-auto-review-${{ github.event.pull_request.number }}${{
      github.event.action == 'labeled'
        && format('-labeled-{0}', github.event.label.name)
        || ''
    }}
  cancel-in-progress: false

jobs:
  review:
    uses: chrischall/workflows/.github/workflows/reusable-pr-auto-review.yml@main
    with:
      conventions_hint: >-
        This is a Claude Code marketplace CATALOG, not application code.
        `.claude-plugin/marketplace.json` is GENERATED by `scripts/regen.py`
        and must never be hand-edited; it must stay canonically formatted
        (`json.dumps(indent=2)` + trailing newline — CI enforces this). Plugin
        `name`s must be unique across the catalog. Each plugin `source` is
        either `{source: github, repo}` for a repo-root plugin or
        `{source: git-subdir, url, path}` for a monorepo subpackage — the
        `github` source type has no `path` field. `metadata.version` is the
        catalog's own version (bumped only by release-please); per-plugin
        `version`s mirror their upstream source repos and are carried over by
        regen.py. Scrutinize any change to scripts/regen.py or
        scripts/validate.py, and any plugin source pointing at an unexpected
        repo.
    secrets:
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      release_pat: ${{ secrets.RELEASE_PAT }}
